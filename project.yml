name: BauhausClock
options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.bauhausclk

targets:
  BauhausClock:
    type: bundle
    platform: macOS
    sources:
      - path: BauhausClock
        excludes:
          - Resources/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bauhausclk.BauhausClock
        INFOPLIST_FILE: BauhausClock/Info.plist
        WRAPPER_EXTENSION: saver
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: "YES"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SKIP_INSTALL: "NO"
        INSTALL_PATH: "$(HOME)/Library/Screen Savers"
        LD_RUNPATH_SEARCH_PATHS: "@loader_path/Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
    dependencies:
      - framework: ScreenSaver.framework
        embed: false
      - framework: WebKit.framework
        embed: false
    preBuildScripts:
      - name: "Bundle Web Assets"
        script: |
          # Copy Vite build output into the .saver bundle's Resources/web/
          WEB_SRC="${SRCROOT}/dist"
          WEB_DST="${BUILT_PRODUCTS_DIR}/${WRAPPER_NAME}/Contents/Resources/web"
          if [ -d "$WEB_SRC" ]; then
            mkdir -p "$WEB_DST"
            cp -R "$WEB_SRC/" "$WEB_DST/"
            echo "✓ Copied web assets to $WEB_DST"
          else
            echo "⚠ No dist/ found — run 'npm run build' first"
          fi
        basedOnDependencyAnalysis: false
